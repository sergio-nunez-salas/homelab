---
# =============================================================================
# Inventario de Ansible - Maquinas del cluster K3s
# =============================================================================
#
# Aqui defines TODAS las maquinas que Ansible puede gestionar,
# agrupadas por su funcion en el cluster.
#
# IMPORTANTE: las IPs deben coincidir con las que configuraste
# en terraform/terraform.tfvars (o las que ya tienen tus VMs).
#
# NOTA: TrueNAS NO esta aqui porque se gestiona desde su propia
# interfaz web, no con Ansible.
# =============================================================================

all:
  children:

    # --- Grupo: master ---
    # El nodo que ejecuta el servidor K3s (control plane).
    # Solo hay uno. Es el que gestiona el cluster de Kubernetes.
    master:
      hosts:
        k3s-master:
          ansible_host: 192.168.68.60

    # --- Grupo: workers ---
    # Nodos que ejecutan cargas de trabajo (pods).
    # Se unen al master usando un token secreto.
    workers:
      hosts:
        k3s-worker1:
          ansible_host: 192.168.68.76
        k3s-worker2:
          ansible_host: 192.168.68.82

    # --- Grupo: k3s_cluster ---
    # Grupo "padre" que incluye master + workers.
    # Util para tareas comunes a TODOS los nodos (actualizar SO, etc.)
    k3s_cluster:
      children:
        master:
        workers: